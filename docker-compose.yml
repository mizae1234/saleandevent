version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saran-jeans-web
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - saran-network

  # Caddy Reverse Proxy for Automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - saran-network
    depends_on:
      - web

networks:
  saran-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
