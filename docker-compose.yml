version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saran-jeans-web
    ports:
      - "3003:3003"
    environment:
      # Include all your runtime environment variables here.
      # You can also use an env_file instead of spelling them out.
      - NODE_ENV=production
      - PORT=3003
    env_file:
      - .env
    restart: unless-stopped
